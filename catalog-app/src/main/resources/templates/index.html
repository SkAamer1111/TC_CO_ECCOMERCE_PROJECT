<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Catalog</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            width: 250px;
            background: white;
            margin: 20px;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 3px 10px gray;
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🛒 Product Catalog</h1>

<div class="container">

    <div class="card" th:each="p : ${products}">
        <img th:src="${p.image}">
        <h2 th:text="${p.name}"></h2>
        <h3>
            ₹ <span th:text="${p.price}"></span>
        </h3>

        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
